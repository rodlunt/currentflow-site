<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Rubric Reading Flow Diagram</title>
  <desc id="desc">A five-step flow: target grade column, criteria checklist, weighted priorities, draft with rubric open, pre-submit self-check.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 44px 'Plus Jakarta Sans', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 24px 'Plus Jakarta Sans', Arial, sans-serif; fill: #334155; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .boxTitle { font: 700 24px 'Plus Jakarta Sans', Arial, sans-serif; fill: #1e293b; }
      .boxText { font: 400 20px 'Plus Jakarta Sans', Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #2563eb; stroke-width: 5; fill: none; marker-end: url(#arrowHead); }
      .fontmark { font: 400 14px 'Plus Jakarta Sans', Arial, sans-serif; fill: #94a3b8; }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="640" />
  <text class="title" x="70" y="80">How To Read A Rubric Properly</text>
  <text class="subtitle" x="70" y="120">Use this quick workflow before you write a single paragraph.</text>

  <!-- Card 1: Target (x=70, w=195) -->
  <rect class="box" x="70" y="180" width="195" height="150" />
  <text class="boxTitle" x="90" y="225">1. Target</text>
  <text class="boxText" x="90" y="258">Pick your</text>
  <text class="boxText" x="90" y="286">grade column</text>

  <path class="arrow" d="M265 255 L289 255" />

  <!-- Card 2: Translate (x=293, w=195) -->
  <rect class="box" x="293" y="180" width="195" height="150" />
  <text class="boxTitle" x="313" y="225">2. Translate</text>
  <text class="boxText" x="313" y="258">Turn criteria into</text>
  <text class="boxText" x="313" y="286">checklist tasks</text>

  <path class="arrow" d="M488 255 L512 255" />

  <!-- Card 3: Prioritise (x=516, w=195) -->
  <rect class="box" x="516" y="180" width="195" height="150" />
  <text class="boxTitle" x="536" y="225">3. Prioritise</text>
  <text class="boxText" x="536" y="258">Allocate time</text>
  <text class="boxText" x="536" y="286">by weighting</text>

  <path class="arrow" d="M711 255 L735 255" />

  <!-- Card 4: Draft (x=739, w=195) -->
  <rect class="box" x="739" y="180" width="195" height="150" />
  <text class="boxTitle" x="759" y="225">4. Draft</text>
  <text class="boxText" x="759" y="258">Keep rubric open</text>
  <text class="boxText" x="759" y="286">while writing</text>

  <path class="arrow" d="M934 255 L958 255" />

  <!-- Card 5: Check (x=962, w=195) — was 145px, now same as all others -->
  <rect class="box" x="962" y="180" width="195" height="150" />
  <text class="boxTitle" x="982" y="225">5. Check</text>
  <text class="boxText" x="982" y="258">Self-assess</text>
  <text class="boxText" x="982" y="286">before submitting</text>

  <!-- Result box -->
  <rect class="box" x="70" y="390" width="1087" height="170" />
  <text class="boxTitle" x="95" y="435">Result</text>
  <text class="boxText" x="95" y="470">You stop guessing what "depth" means and start writing directly to the marking standard.</text>
  <text class="boxText" x="95" y="503">That is the difference between descriptive work and consistent Distinction/HD performance.</text>

  <!-- GradeMap fontmark -->
  <text class="fontmark" x="1075" y="590">grademap.com.au</text>
</svg>
