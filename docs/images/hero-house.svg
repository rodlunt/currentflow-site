<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 210" fill="none" aria-hidden="true">
  <defs>
    <clipPath id="cf-lr"><polygon points="58,100 170,38 170,100"/></clipPath>
    <clipPath id="cf-rr"><polygon points="170,38 282,100 170,100"/></clipPath>
  </defs>

  <!-- Ground line -->
  <line x1="24" y1="190" x2="316" y2="190" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

  <!-- Left tree -->
  <line x1="38" y1="172" x2="38" y2="190" stroke="rgba(255,255,255,0.22)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="38" cy="158" r="18" fill="#F59E0B" opacity="0.80"/>

  <!-- Right tree -->
  <line x1="302" y1="172" x2="302" y2="190" stroke="rgba(255,255,255,0.22)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="302" cy="158" r="18" fill="#F59E0B" opacity="0.80"/>

  <!-- House walls -->
  <rect x="72" y="100" width="196" height="90"
        fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.20)" stroke-width="1.5"/>

  <!-- Left roof slope (draw before panels so panels render on top) -->
  <polygon points="58,100 170,38 170,100"
           fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.20)" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Left solar panels -->
  <g clip-path="url(#cf-lr)">
    <!-- Panel fills -->
    <polygon points="72,95 107,95 123,86 88,86" fill="#F59E0B" opacity="0.92"/>
    <polygon points="110,95 145,95 161,86 126,86" fill="#F59E0B" opacity="0.92"/>
    <polygon points="90,85 125,85 141,76 106,76" fill="#F59E0B" opacity="0.92"/>
    <polygon points="128,85 163,85 179,76 144,76" fill="#F59E0B" opacity="0.92"/>
    <!-- Panel borders -->
    <polygon points="72,95 107,95 123,86 88,86" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="0.9"/>
    <polygon points="110,95 145,95 161,86 126,86" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="0.9"/>
    <polygon points="90,85 125,85 141,76 106,76" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="0.9"/>
    <polygon points="128,85 163,85 179,76 144,76" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="0.9"/>
    <!-- Cell dividers -->
    <line x1="80"  y1="91" x2="115" y2="91" stroke="rgba(255,255,255,0.22)" stroke-width="0.7"/>
    <line x1="118" y1="91" x2="153" y2="91" stroke="rgba(255,255,255,0.22)" stroke-width="0.7"/>
    <line x1="98"  y1="81" x2="133" y2="81" stroke="rgba(255,255,255,0.22)" stroke-width="0.7"/>
    <line x1="136" y1="81" x2="171" y2="81" stroke="rgba(255,255,255,0.22)" stroke-width="0.7"/>
  </g>

  <!-- Right roof slope -->
  <polygon points="170,38 282,100 170,100"
           fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Right solar panels -->
  <g clip-path="url(#cf-rr)">
    <polygon points="268,95 233,95 217,86 252,86" fill="#F59E0B" opacity="0.92"/>
    <polygon points="230,95 195,95 179,86 214,86" fill="#F59E0B" opacity="0.92"/>
    <polygon points="250,85 215,85 199,76 234,76" fill="#F59E0B" opacity="0.92"/>
    <polygon points="212,85 177,85 161,76 196,76" fill="#F59E0B" opacity="0.92"/>
    <polygon points="268,95 233,95 217,86 252,86" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="0.9"/>
    <polygon points="230,95 195,95 179,86 214,86" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="0.9"/>
    <polygon points="250,85 215,85 199,76 234,76" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="0.9"/>
    <polygon points="212,85 177,85 161,76 196,76" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="0.9"/>
    <line x1="225" y1="91" x2="260" y2="91" stroke="rgba(255,255,255,0.22)" stroke-width="0.7"/>
    <line x1="187" y1="91" x2="222" y2="91" stroke="rgba(255,255,255,0.22)" stroke-width="0.7"/>
    <line x1="207" y1="81" x2="242" y2="81" stroke="rgba(255,255,255,0.22)" stroke-width="0.7"/>
    <line x1="169" y1="81" x2="204" y2="81" stroke="rgba(255,255,255,0.22)" stroke-width="0.7"/>
  </g>

  <!-- Ridge cap (amber accent) -->
  <line x1="163" y1="38" x2="177" y2="38" stroke="#F59E0B" stroke-width="2.5" opacity="0.65" stroke-linecap="round"/>

  <!-- Left window -->
  <rect x="90" y="116" width="46" height="36" fill="rgba(96,165,250,0.22)" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <line x1="113" y1="116" x2="113" y2="152" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
  <line x1="90"  y1="134" x2="136" y2="134" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>

  <!-- Right window -->
  <rect x="204" y="116" width="46" height="36" fill="rgba(96,165,250,0.22)" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <line x1="227" y1="116" x2="227" y2="152" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
  <line x1="204" y1="134" x2="250" y2="134" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>

  <!-- Door -->
  <rect x="153" y="156" width="34" height="34" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <!-- Door knob (amber accent) -->
  <circle cx="181" cy="173" r="2.5" fill="#F59E0B" opacity="0.65"/>
</svg>
