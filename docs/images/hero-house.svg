<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 210" fill="none" aria-hidden="true">
  <defs>
    <!-- Drop shadow on whole house group -->
    <filter id="hs" x="-18%" y="-12%" width="136%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="9"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.38"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Roof gradients (userSpaceOnUse for accurate slope direction) -->
    <linearGradient id="lg-lr" gradientUnits="userSpaceOnUse" x1="114" y1="100" x2="170" y2="38">
      <stop offset="0%" stop-color="#B84020"/>
      <stop offset="55%" stop-color="#D06030"/>
      <stop offset="100%" stop-color="#E87848"/>
    </linearGradient>
    <linearGradient id="lg-rr" gradientUnits="userSpaceOnUse" x1="170" y1="38" x2="226" y2="100">
      <stop offset="0%" stop-color="#C85030"/>
      <stop offset="100%" stop-color="#8A3018"/>
    </linearGradient>

    <!-- Wall gradient: light → slightly warm shadow at base -->
    <linearGradient id="lg-wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CCB8A2"/>
      <stop offset="100%" stop-color="#AE9880"/>
    </linearGradient>

    <!-- Solar panel: dark navy, faint metallic sheen at top -->
    <linearGradient id="lg-panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1C3870"/>
      <stop offset="100%" stop-color="#0C1830"/>
    </linearGradient>

    <!-- Window glass: cool reflection top-left, deeper blue bottom-right -->
    <linearGradient id="lg-win" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8EAFC" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#82C0E0" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#4A90C0" stop-opacity="0.92"/>
    </linearGradient>

    <!-- Ground: dark earthy green fading downward -->
    <linearGradient id="lg-gnd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E4210"/>
      <stop offset="100%" stop-color="#0C1A06"/>
    </linearGradient>

    <!-- Clip paths for panel regions -->
    <clipPath id="cf-lr">
      <polygon points="58,100 170,38 170,100"/>
    </clipPath>
    <clipPath id="cf-rr">
      <polygon points="170,38 282,100 170,100"/>
    </clipPath>
  </defs>

  <!-- Ground strip -->
  <rect x="0" y="178" width="340" height="32" fill="url(#lg-gnd)" rx="3"/>

  <!-- ── Left tree ── -->
  <rect x="37" y="160" width="6" height="20" fill="#1A2E08" opacity="0.95"/>
  <ellipse cx="40" cy="152" rx="22" ry="17" fill="#1A4410" opacity="0.92"/>
  <ellipse cx="32" cy="158" rx="15" ry="11" fill="#204E12" opacity="0.78"/>
  <ellipse cx="48" cy="156" rx="13" ry="10" fill="#1A4410" opacity="0.72"/>
  <ellipse cx="40" cy="144" rx="14" ry="11" fill="#286018" opacity="0.65"/>

  <!-- ── Right tree ── -->
  <rect x="297" y="160" width="6" height="20" fill="#1A2E08" opacity="0.95"/>
  <ellipse cx="300" cy="152" rx="22" ry="17" fill="#1A4410" opacity="0.92"/>
  <ellipse cx="308" cy="158" rx="15" ry="11" fill="#204E12" opacity="0.78"/>
  <ellipse cx="292" cy="156" rx="13" ry="10" fill="#1A4410" opacity="0.72"/>
  <ellipse cx="300" cy="144" rx="14" ry="11" fill="#286018" opacity="0.65"/>

  <!-- ═══ HOUSE (drop shadow applied to whole group) ═══ -->
  <g filter="url(#hs)">

    <!-- Chimney (must be behind roof) -->
    <rect x="187" y="38" width="13" height="30" fill="#5A2E18"/>
    <rect x="185" y="34" width="17" height="6" fill="#482412" rx="1"/>
    <!-- Subtle smoke puffs -->
    <ellipse cx="194" cy="28" rx="6" ry="5" fill="#9A9AA0" opacity="0.10"/>
    <ellipse cx="190" cy="21" rx="4" ry="4" fill="#9A9AA0" opacity="0.07"/>

    <!-- House walls -->
    <rect x="72" y="100" width="196" height="78" fill="url(#lg-wall)"/>
    <!-- Fascia / top trim board -->
    <rect x="68" y="98" width="204" height="5" fill="#CABB9A"/>
    <!-- Base course -->
    <rect x="72" y="172" width="196" height="6" fill="#9A8872"/>

    <!-- ── Left roof slope ── -->
    <polygon points="58,100 170,38 170,100" fill="url(#lg-lr)"/>

    <!-- Left solar panels (clipped) -->
    <g clip-path="url(#cf-lr)">
      <!-- Row 0 -->
      <polygon points="72,95 107,95 123,86 88,86" fill="url(#lg-panel)"/>
      <polygon points="110,95 145,95 161,86 126,86" fill="url(#lg-panel)"/>
      <!-- Row 1 -->
      <polygon points="90,85 125,85 141,76 106,76" fill="url(#lg-panel)"/>
      <polygon points="128,85 163,85 179,76 144,76" fill="url(#lg-panel)"/>

      <!-- Borders -->
      <polygon points="72,95 107,95 123,86 88,86"   fill="none" stroke="#3468B8" stroke-width="1.1"/>
      <polygon points="110,95 145,95 161,86 126,86"  fill="none" stroke="#3468B8" stroke-width="1.1"/>
      <polygon points="90,85 125,85 141,76 106,76"   fill="none" stroke="#3468B8" stroke-width="1.1"/>
      <polygon points="128,85 163,85 179,76 144,76"  fill="none" stroke="#3468B8" stroke-width="1.1"/>

      <!-- Horizontal cell dividers -->
      <line x1="80" y1="91" x2="115" y2="91" stroke="#3468B8" stroke-width="0.8" opacity="0.75"/>
      <line x1="118" y1="91" x2="153" y2="91" stroke="#3468B8" stroke-width="0.8" opacity="0.75"/>
      <line x1="98" y1="81" x2="133" y2="81" stroke="#3468B8" stroke-width="0.8" opacity="0.75"/>
      <line x1="136" y1="81" x2="171" y2="81" stroke="#3468B8" stroke-width="0.8" opacity="0.75"/>

      <!-- Metallic sheen strip at top of each panel -->
      <polygon points="88,86 123,86 123,88.5 88,88.5" fill="#6AC4F8" opacity="0.22"/>
      <polygon points="126,86 161,86 161,88.5 126,88.5" fill="#6AC4F8" opacity="0.22"/>
      <polygon points="106,76 141,76 141,78.5 106,78.5" fill="#6AC4F8" opacity="0.22"/>
      <polygon points="144,76 179,76 179,78.5 144,78.5" fill="#6AC4F8" opacity="0.22"/>
    </g>

    <!-- Left eave shadow line -->
    <line x1="58" y1="100" x2="170" y2="100" stroke="#4A1208" stroke-width="2.5" opacity="0.55"/>

    <!-- ── Right roof slope ── -->
    <polygon points="170,38 282,100 170,100" fill="url(#lg-rr)"/>

    <!-- Right solar panels (mirrored) -->
    <g clip-path="url(#cf-rr)">
      <!-- Row 0 -->
      <polygon points="268,95 233,95 217,86 252,86" fill="url(#lg-panel)"/>
      <polygon points="230,95 195,95 179,86 214,86" fill="url(#lg-panel)"/>
      <!-- Row 1 -->
      <polygon points="250,85 215,85 199,76 234,76" fill="url(#lg-panel)"/>
      <polygon points="212,85 177,85 161,76 196,76" fill="url(#lg-panel)"/>

      <polygon points="268,95 233,95 217,86 252,86"  fill="none" stroke="#3468B8" stroke-width="1.1"/>
      <polygon points="230,95 195,95 179,86 214,86"  fill="none" stroke="#3468B8" stroke-width="1.1"/>
      <polygon points="250,85 215,85 199,76 234,76"  fill="none" stroke="#3468B8" stroke-width="1.1"/>
      <polygon points="212,85 177,85 161,76 196,76"  fill="none" stroke="#3468B8" stroke-width="1.1"/>

      <line x1="225" y1="91" x2="260" y2="91" stroke="#3468B8" stroke-width="0.8" opacity="0.75"/>
      <line x1="187" y1="91" x2="222" y2="91" stroke="#3468B8" stroke-width="0.8" opacity="0.75"/>
      <line x1="207" y1="81" x2="242" y2="81" stroke="#3468B8" stroke-width="0.8" opacity="0.75"/>
      <line x1="169" y1="81" x2="204" y2="81" stroke="#3468B8" stroke-width="0.8" opacity="0.75"/>

      <polygon points="217,86 252,86 252,88.5 217,88.5" fill="#6AC4F8" opacity="0.22"/>
      <polygon points="179,86 214,86 214,88.5 179,88.5" fill="#6AC4F8" opacity="0.22"/>
      <polygon points="199,76 234,76 234,78.5 199,78.5" fill="#6AC4F8" opacity="0.22"/>
      <polygon points="161,76 196,76 196,78.5 161,78.5" fill="#6AC4F8" opacity="0.22"/>
    </g>

    <!-- Right eave shadow line -->
    <line x1="170" y1="100" x2="282" y2="100" stroke="#3A1006" stroke-width="2.5" opacity="0.55"/>

    <!-- Roof ridge cap -->
    <rect x="164" y="35" width="12" height="6" fill="#621408" rx="1.5"/>
    <!-- Ridge highlight -->
    <rect x="165" y="35" width="10" height="2" fill="#8A2010" opacity="0.7" rx="1"/>

    <!-- ── Left window ── -->
    <rect x="83" y="112" width="46" height="38" fill="url(#lg-win)" rx="1.5"/>
    <!-- Frame border -->
    <rect x="82" y="111" width="48" height="40" fill="none" stroke="#C0A880" stroke-width="1.8" rx="2"/>
    <!-- Pane dividers -->
    <line x1="106" y1="111" x2="106" y2="151" stroke="#4A78A0" stroke-width="1.3" opacity="0.85"/>
    <line x1="82"  y1="131" x2="130" y2="131" stroke="#4A78A0" stroke-width="1.3" opacity="0.85"/>
    <!-- Glass highlight patch -->
    <rect x="85" y="114" width="19" height="14" fill="#DCF2FC" opacity="0.35" rx="1"/>

    <!-- ── Right window ── -->
    <rect x="211" y="112" width="46" height="38" fill="url(#lg-win)" rx="1.5"/>
    <rect x="210" y="111" width="48" height="40" fill="none" stroke="#C0A880" stroke-width="1.8" rx="2"/>
    <line x1="234" y1="111" x2="234" y2="151" stroke="#4A78A0" stroke-width="1.3" opacity="0.85"/>
    <line x1="210" y1="131" x2="258" y2="131" stroke="#4A78A0" stroke-width="1.3" opacity="0.85"/>
    <rect x="213" y="114" width="19" height="14" fill="#DCF2FC" opacity="0.35" rx="1"/>

    <!-- ── Door (arched top) ── -->
    <path d="M148,178 L148,140 Q148,124 170,124 Q192,124 192,140 L192,178 Z" fill="#7A4828"/>
    <path d="M148,178 L148,140 Q148,124 170,124 Q192,124 192,140 L192,178 Z" fill="none" stroke="#5A3016" stroke-width="1.2"/>
    <!-- Door upper panels -->
    <rect x="153" y="130" width="15" height="18" fill="none" stroke="#9A6238" stroke-width="0.9" rx="1.5" opacity="0.6"/>
    <rect x="172" y="130" width="15" height="18" fill="none" stroke="#9A6238" stroke-width="0.9" rx="1.5" opacity="0.6"/>
    <!-- Door lower panel -->
    <rect x="153" y="151" width="34" height="14" fill="none" stroke="#9A6238" stroke-width="0.9" rx="1" opacity="0.5"/>
    <!-- Doorknob -->
    <circle cx="186" cy="157" r="4.5" fill="#C89A18"/>
    <circle cx="186" cy="157" r="4.5" fill="none" stroke="#A07808" stroke-width="0.9"/>
    <circle cx="184.5" cy="155.5" r="1.8" fill="#F0D060" opacity="0.55"/>

    <!-- Wall shadow under fascia (subtle depth) -->
    <rect x="72" y="103" width="196" height="5" fill="#000000" opacity="0.08"/>

  </g><!-- end house group with filter -->
</svg>
