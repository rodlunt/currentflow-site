<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="100 0 800 780">
  <defs>
    <linearGradient id="pinBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#4f8ffc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="pinGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#181818"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="capLift" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(150,30)" filter="url(#softShadow)">
    <ellipse cx="350" cy="705" rx="110" ry="10" fill="#000" opacity="0.18"/>
    <path d="M 120,305 A 228 228 0 0 1 580,305 C 580,478 440,575 350,680 C 260,575 120,478 120,305 Z" fill="#ffffff"/>
    <path d="M 120,305 A 230 230 0 0 1 580,305"
          fill="none" stroke="url(#pinBlue)" stroke-width="36" stroke-linecap="round"/>
    <path d="M 120,305 C 120,478 260,575 350,680 C 440,575 580,478 580,305"
          fill="none" stroke="url(#pinGreen)" stroke-width="36" stroke-linecap="round"/>
    <g fill="none" stroke="#204860" stroke-width="18" stroke-linejoin="round" stroke-linecap="round">
      <path d="M 350,265 C 300,245 240,238 190,240 L 190,470 C 245,465 305,470 350,490 Z"/>
      <path d="M 350,265 C 400,245 460,238 510,240 L 510,470 C 455,465 395,470 350,490 Z"/>
      <line x1="350" y1="265" x2="350" y2="490" stroke-width="20"/>
    </g>
    <g fill="url(#capGrad)" stroke="#ffffff" stroke-width="9" stroke-linejoin="round" stroke-linecap="round" filter="url(#capLift)">
      <path d="M 398,192 Q 478,220 558,192 L 548,246 Q 478,274 408,246 Z"/>
      <path d="M 478,132 L 600,180 L 478,228 L 356,180 Z"/>
    </g>
    <path d="M 478,132 L 600,180 L 478,146 L 356,180 Z" fill="#ffffff" opacity="0.10"/>
    <circle cx="478" cy="180" r="6" fill="#181818"/>
    <path d="M 520,204 Q 528,228 524,252" fill="none" stroke="#181818" stroke-width="5" stroke-linecap="round"/>
    <circle cx="524" cy="256" r="6" fill="#181818"/>
    <path d="M 255,445 Q 305,375 380,305"
          fill="none" stroke="#059669" stroke-width="18"
